name: MarisCrates
main: net.maris.crates.MarisCratesPlugin
version: '1.0'
api-version: '1.21'
folia-supported: true
authors: [Maris]
depend: [NBTAPI]
softdepend: [PlaceholderAPI]
commands:
  crates:
    description: MarisCrates admin command
    usage: /crates
    permission: mariscrates.admin
permissions:
  mariscrates.admin:
    default: op
libraries:
  - com.zaxxer:HikariCP:7.0.2
  - org.xerial:sqlite-jdbc:3.53.0.0
  - com.mysql:mysql-connector-j:9.7.0
